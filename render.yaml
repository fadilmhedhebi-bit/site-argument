databases:
  - name: tournee-snack-db
    plan: free
    databaseName: tournee_snack

services:
  - type: web
    name: tournee-snack-express
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build && npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tournee-snack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
